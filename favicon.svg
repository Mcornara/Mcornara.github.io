<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="MC"
>
  <!--
    Las iniciales tienen un ancho fijo para evitar que se recorten si el
    navegador reemplaza Georgia por otra tipografía serif.
  -->
  <text
    x="4"
    y="47"
    fill="#1C1917"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="44"
    font-weight="700"
    textLength="48"
    lengthAdjust="spacingAndGlyphs"
  >MC</text>

  <!-- Punto bordó tomado de la paleta del portfolio. -->
  <circle cx="57" cy="46" r="4" fill="#712543" />
</svg>
